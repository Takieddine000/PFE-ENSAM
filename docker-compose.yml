version: '3.8'

services:
  app:
    image: takieddine2004/stockapp:latest
    ports:
      - "8000:8000"
    environment:
      APP_NAME: StockApp
      APP_KEY: base64:wRIyvmGOKBKU+MGUnx40zfma5HMt2Yx33IczGeLRlYM=
      APP_ENV: local
      APP_DEBUG: false
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: stock_app
      DB_USERNAME: stockuser
      DB_PASSWORD: stockpass
      MAIL_MAILER: log
      FILESYSTEM_DISK: public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/storage/app/public
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: stock_app
      MYSQL_USER: stockuser
      MYSQL_PASSWORD: stockpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  db_data:
  storage_data: